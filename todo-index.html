<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>To-Do List Application</h1>
    <div class="input-container">
        <input type="text" id="task-input" placeholder="Add a new task...">
        <button id="add-task-btn">Add Task</button>
    </div>
    <div class="filter-buttons">
        <button id="all-btn">All</button>
        <button id="active-btn">Active</button>
        <button id="completed-btn">Completed</button>
    </div>
    <div class="todo-list-container">
        <ul id="todo-list">
            <!-- List of to-do items will be rendered here -->
        </ul>
    </div>
    <div class="stats-section">
        <p id="total-tasks">Total Tasks: 0</p>
        <p id="completed-tasks">Completed Tasks: 0</p>
    </div>
    <script src="app.js"></script>
</body>
</html>
